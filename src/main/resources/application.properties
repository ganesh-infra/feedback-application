spring.application.name=spring-feedback-app

# Server
server.port=8088

# MySQL Localhost Connection
spring.datasource.url=jdbc:mysql://localhost:3306/feedback_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=tiger

# JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# Reduce memory/log usage (good for low systems)
logging.level.root=INFO
spring.main.lazy-initialization=true

